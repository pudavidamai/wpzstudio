<!DOCTYPE html>
<html>
  <head>
    {% include meta.html %}

    <title>
      {% if page.title %}{{ page.title }} - {% endif %}{{ site.name }}
    </title>

    <link rel="stylesheet" type="text/css" href="{{ '/style.css' | relative_url }}" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ '/feed.xml' | relative_url }}" />
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ '/' | relative_url }}" class="site-avatar"><img src="{{ site.avatar }}" alt="{{ site.name }} avatar" /></a>

          <div class="site-info">
            <h1 class="site-name"><a href="{{ '/' | relative_url }}">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/about/' | relative_url }}">About</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container {% if page.wide %}container-wide{% endif %}">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
